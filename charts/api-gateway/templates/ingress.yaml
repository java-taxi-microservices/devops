apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: api-gateway

spec:
  ingressClassName: traefik

  rules:
    - host: {{ .Values.ingress.host }}

      http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.service.port }}
