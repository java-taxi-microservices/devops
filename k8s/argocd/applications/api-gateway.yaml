apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: api-gateway
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/java-taxi-microservices/devops.git
    targetRevision: main
    path: charts/api-gateway

  destination:
    server: https://kubernetes.default.svc
    namespace: taxi

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
